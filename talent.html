<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SEE 生命印迹 · 先天思维特质报告</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');

:root {
  --bg: #0f0f28; --card: #161630; --border: #2a2a45;
  --text: #e0dcd4; --muted: #8a8590; --accent: #6b96ac;
  --accent2: #a08868; --gold: #b8a080; --danger: #e05555;
  --shadow: 0 2px 12px rgba(0,0,0,.2); --radius: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif; background: var(--bg); color: var(--text); line-height:1.7; min-height:100vh; }

/* Header */
.hero {
  background: linear-gradient(170deg, #0f0f28 0%, #162038 35%, #1a2440 60%, #1a2038 100%);
  color: #e0dcd4; padding: 40px 24px 0; text-align:center;
}
.hero-top, .hero .features { position: relative; z-index: 1; }
.hero-bg {
  margin-top: 20px; line-height: 0; opacity: 1;
}
.hero-bg img { width: 100%; max-width: 720px; height: auto; display: block; margin: 0 auto; }
.hero-top { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 4px; }
.hero-logo {
  font-size: 2.6em; line-height: 1;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,.08));
}
.hero-brand { text-align: left; }
.hero-name {
  font-family: "Noto Serif SC", "Songti SC", serif;
  font-size: 1.7em; font-weight: 700; letter-spacing: .06em;
  line-height: 1.2; color: #f0ece2;
}
.hero-subtitle {
  font-size: .88em; letter-spacing: .15em; font-weight: 400;
  color: #a09888; margin-top: 2px;
}
.hero .features { display: flex; justify-content: center; gap: 12px; margin-top: 28px; }
.hero .feature {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.1);
  border-radius: 14px; padding: 16px 14px; flex: 1; max-width: 180px;
  transition: all .2s; backdrop-filter: blur(4px);
}
.hero .feature:hover {
  background: rgba(255,255,255,.14); border-color: rgba(255,255,255,.25);
  transform: translateY(-1px);
}
.hero .feature-icon { font-size: 1.3em; }
.hero .feature-text { font-size: .82em; font-weight: 500; color: #d8d2c4; white-space: nowrap; }
@media (max-width: 420px) {
  .hero .features { gap: 6px; }
  .hero .feature { padding: 12px 8px; max-width: 120px; }
  .hero .feature-text { font-size: .7em; }
}

.container { max-width: 720px; margin: 0 auto; padding: 20px 12px; }
.card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); }
.report-content { padding: 16px; background: #1a1a35; border-radius: 10px; font-size: .9em; line-height: 1.8; max-height: 500px; overflow-y: auto; border: 1px solid #2a2a45; }
@media (max-width: 500px) {
  .container { padding: 12px 6px; }
  .card { padding: 12px 10px; border-radius: 10px; }
  .report-content { padding: 12px 10px; font-size: .85em; }
  .btn { padding: 10px 16px; font-size: .85em; }
  h2 { font-size: 1em; }
}
.card h2 { font-size: 1.1em; margin-bottom: 16px; display:flex; align-items:center; gap:8px; font-weight: 600; color: #e0dcd4; }

.step-badge { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; border-radius:50%; background:var(--accent); color:#0f0f28; font-size:.8em; font-weight:700; margin-right:6px; flex-shrink:0; }

.upload-zone p, .upload-zone .icon { color: #8a8590; }

/* Upload */
.upload-zone { border: 2px dashed #3a3a55; border-radius: var(--radius); text-align: center; cursor: pointer; transition: all .2s; background: #1a1a38; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:200px; padding: 16px; }
.upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: #1e1e40; }
.upload-zone .icon { font-size: 2em; margin-bottom: 6px; }
.upload-zone p { color: var(--muted); font-size: .85em; }
.preview-img { max-width: 100%; max-height: 280px; border-radius: 8px; border: 1px solid var(--border); display: none; }
.preview-img.show { display: block; }

.btn { display: inline-flex; align-items:center; gap:6px; padding: 10px 22px; border: none; border-radius: 10px; font-size: .9em; font-weight: 500; cursor: pointer; transition: all .15s; }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(107,150,172,.3); }
.btn-primary:hover:not(:disabled) { background: #5a8296; box-shadow: 0 4px 14px rgba(107,150,172,.4); transform: translateY(-1px); }
.btn-outline { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
.btn-outline:hover { background: rgba(107,150,172,.1); }
.btn-sm { padding: 6px 16px; font-size: .8em; border-radius: 8px; }

/* Results */
.result-grid { display: flex; flex-direction: column; gap: 5px; }
.result-item { display: flex; align-items: center; gap: 10px; padding: 8px 14px; background: #1e1e3a; border-radius: 10px; font-size: .85em; cursor: pointer; transition: all .12s; border: 1.5px solid transparent; }
.result-item:hover { border-color: var(--accent); background: #242444; }
.result-item .q { flex: 1; min-width: 0; }
.result-item .ans { font-weight: 700; font-size: 1.1em; color: var(--accent); min-width: 32px; text-align: center; background: #1a2a38; border-radius: 8px; padding: 2px 8px; }
.result-item.low-conf { background: #2e1e1e; border-color: #553333; }
.result-item.low-conf .ans { color: var(--danger); background: #3e2020; }

.module-title { font-weight: 600; color: var(--accent2); margin: 14px 0 6px; font-size: .9em; padding-bottom: 3px; border-bottom: 1px solid #2a2a45; }
.report-content.loading { text-align:center; color: var(--muted); padding: 40px; border: none; }
.report-content h1 { font-family: "Noto Serif SC", serif; font-size: 1.3em; color: #e8dcc0; margin: 20px 0 16px; font-weight: 700; border-bottom: 1px solid #3a3a55; padding-bottom: 8px; }
.report-content h2 { font-family: "Noto Serif SC", serif; font-size: 1.1em; color: #d0c8a0; margin: 20px 0 10px; }
.report-content h3 { font-family: "Noto Serif SC", serif; font-size: .95em; color: #c0b898; margin: 14px 0 8px; font-weight: 600; }
.report-content p { margin-bottom: 8px; }
.report-content ul { margin: 8px 0; padding-left: 20px; }
.report-content li { margin-bottom: 4px; }

/* Extra reports */
.extra-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 14px; }
@media (max-width: 500px) { .extra-cards { grid-template-columns: 1fr; } }
.extra-card { padding: 18px 14px; background: #1a1a35; border: 1.5px solid #2a2a45; border-radius: 12px; text-align: center; cursor: pointer; transition: all .2s; }
.extra-card:hover { border-color: var(--accent); background: #202040; box-shadow: 0 4px 16px rgba(0,0,0,.3); transform: translateY(-1px); }
.extra-card .icon { font-size: 1.5em; margin-bottom: 4px; }
.extra-card .title { font-weight: 600; font-size: .9em; color: #d8d0c0; }
.extra-card .desc { font-size: .75em; color: var(--muted); margin-top: 2px; }
.extra-card.loading { opacity: .6; pointer-events: none; }
.extra-card.done { border-color: var(--accent); background: #1a2a28; cursor: default; }
.extra-card.done .title { color: var(--accent); }

.flex-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.hidden { display: none !important; }

#manualCard select, #manualCard input { background: #1a1a38; color: #e0dcd4; border-color: #3a3a55; }
</style>
<script src="tesseract.min.js"></script>
<script>
window.TESSERACT_CONFIG = {
  workerPath: 'tesseract/worker.min.js',
  langPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/',
};
</script>
</head>
<body>

<div class="hero">
  <div class="hero-top">
    <div class="hero-logo">🧬</div>
    <div class="hero-brand">
      <div class="hero-name">SEE 生命印迹</div>
      <div class="hero-subtitle">元认知训练系统</div>
    </div>
  </div>
  <div class="features">
    <div class="feature" onclick="location.href='index.html'"><div class="feature-icon">🧠</div><div class="feature-text">思维画像报告</div></div>
    <div class="feature" style="background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.3)"><div class="feature-icon">🌿</div><div class="feature-text">先天思维特质报告</div></div>
    <div class="feature" onclick="location.href='insight.html'"><div class="feature-icon">🪞</div><div class="feature-text">自我觉察陪伴</div></div>
  </div>
  <div class="hero-bg"><img src="hero_talent.jpg" alt=""></div>
</div>

<div class="container">

<!-- ====== STEP 1: Upload ====== -->
<div class="card">
  <h2><span class="step-badge">1</span> 上传你的先天天赋特质报告</h2>
  <div style="margin-bottom:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <label style="font-size:.85em;color:var(--muted);white-space:nowrap">🔑 用户码</label>
    <input type="text" id="userCode" placeholder="输入你的用户码" style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:.85em;background:#1a1a38;color:#e0dcd4;flex:1;max-width:240px" onchange="loadUserReports()">
    <button class="btn btn-outline btn-sm" onclick="loadUserReports()">加载</button>
    <span style="font-size:.75em;color:var(--muted)">输入后报告自动保存，刷新不丢失</span>
  </div>
  <div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap">
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()" style="flex:1;min-width:200px;position:relative;overflow:hidden">
      <div id="uploadPlaceholder">
        <div class="icon">📸</div>
        <p>点击或拖拽上传报告照片</p>
        <p style="font-size:.75em;margin-top:4px">支持 JPG/PNG，请拍摄清晰</p>
      </div>
      <img id="preview" class="preview-img" style="display:none;position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain">
    </div>
    <div style="flex-shrink:0;text-align:center">
      <div style="font-size:.75em;color:var(--muted);margin-bottom:4px">📋 上传样本参考</div>
      <img src="talent_sample.jpg" style="max-width:200px;max-height:200px;border-radius:8px;border:1px solid var(--border);cursor:pointer;object-fit:contain" onclick="window.open(this.src)" title="点击查看大图">
    </div>
  </div>
  <div class="hidden" id="savedReportsSection" style="margin-top:12px;padding:10px 14px;background:#1a1a38;border-radius:8px;font-size:.85em">
    <div style="color:var(--accent);margin-bottom:6px">📂 已保存的报告</div>
    <div id="savedReportsList"></div>
  </div>
  <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleFile(this.files[0])">
  <div class="flex-row" style="margin-top:10px;align-items:center;gap:12px">
    <label style="font-size:.8em;color:var(--muted);white-space:nowrap">🎂 年龄 *</label>
    <input type="number" id="reportAge" value="" min="0" max="120" placeholder="必填" required style="width:60px;padding:5px 8px;border-radius:8px;border:1.5px solid var(--border);background:#1a1a38;color:#e0dcd4;font-size:.8em">
    <label style="font-size:.8em;color:var(--muted);white-space:nowrap;margin-left:8px">👤 对象</label>
    <select id="reportTarget" style="padding:6px 10px;border-radius:8px;border:1.5px solid var(--border);background:#1a1a38;color:#e0dcd4;font-size:.8em;cursor:pointer">
      <option value="self">🙋 本人</option>
      <option value="parent">👨‍👩‍👧 父母</option>
      <option value="global">🌍 全局视角</option>
    </select>
  </div>
  <div class="flex-row" style="margin-top:6px">
    <button class="btn btn-primary" id="btnRecognize" disabled onclick="startFullFlow()">🔍 识别并生成报告</button>
    <select id="reportStyle" style="padding:6px 10px;border-radius:8px;border:1.5px solid var(--border);background:#1a1a38;color:#e0dcd4;font-size:.8em;cursor:pointer">
      <option value="gentle">🌿 温和顾问</option>
      <option value="parent">💝 亲子顾问</option>
      <option value="direct">🎯 专业规划师</option>
      <option value="educator">📚 教育分析师</option>
      <option value="coach">⚡ 成长教练</option>
    </select>
    <span style="font-size:.8em;color:var(--muted)" id="uploadStatus"></span>
  </div>
</div>

<!-- ====== STEP 2: Report ====== -->
<div class="card hidden" id="reportCard">
  <h2><span class="step-badge">2</span> 你的解读报告 <span style="float:right;display:flex;gap:4px"><button class="btn btn-outline btn-sm" onclick="downloadReport(null,'doc')" style="font-size:.65em;padding:3px 8px">📥 Word</button><button class="btn btn-outline btn-sm" onclick="downloadReport(null,'pdf')" style="font-size:.65em;padding:3px 8px">🖨️ PDF</button></span></h2>
  <div id="ocrProgress" style="font-size:.8em;color:var(--muted);margin-bottom:8px"></div>
  <div class="report-content loading" id="reportContent">正在生成...</div>
</div>
<!-- ====== Chat ====== -->
<div class="card" id="chatSection">
  <h2>💬 个性化补充与报告整合</h2>
  <div id="chatMessages" style="max-height:350px;overflow-y:auto;margin-bottom:10px;font-size:.85em;line-height:1.6"></div>
  <div class="flex-row" style="gap:8px;margin-bottom:10px">
    <input type="text" id="chatInput" placeholder="输入个性化补充或修正意见，将整合进最终报告" style="flex:1;padding:8px 12px;border-radius:8px;border:1.5px solid var(--border);background:#1a1a38;color:#e0dcd4;font-size:.85em" onkeydown="if(event.key==='Enter')sendChat()">
    <button class="btn btn-primary btn-sm" onclick="sendChat()">发送</button>
  </div>
  <button class="btn btn-primary" onclick="summarizeChat()" id="btnSummarize" style="display:block;width:100%;padding:14px;font-size:1em">📝 生成整合报告</button>
</div>
<div class="card">
  <h2>💫 关系合盘</h2>
  <div style="font-size:.82em;color:var(--muted);margin-bottom:10px">上传对方报告，生成双人关系解读</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
    <div class="extra-card" onclick="startComposite('parent')" id="compositeParent">
      <div class="icon">👨‍👧</div><div class="title">亲子关系合盘</div>
      <div class="desc">上传孩子的报告</div>
      <div class="hidden" id="compositeParentStatus" style="font-size:.75em;margin-top:4px"></div>
    </div>
    <div class="extra-card" onclick="startComposite('partner')" id="compositePartner">
      <div class="icon">💑</div><div class="title">亲密关系合盘</div>
      <div class="desc">上传伴侣的报告</div>
      <div class="hidden" id="compositePartnerStatus" style="font-size:.75em;margin-top:4px"></div>
    </div>
    <div class="extra-card" onclick="startComposite('family')" id="compositeFamily">
      <div class="icon">👨‍👩‍👧</div><div class="title">家庭合盘</div>
      <div class="desc">上传家人的报告</div>
      <div class="hidden" id="compositeFamilyStatus" style="font-size:.75em;margin-top:4px"></div>
    </div>
  </div>
  <input type="file" id="compositeFile" accept="image/*" class="hidden" onchange="handleCompositeFile(this.files[0])">
</div>

</div>


</div>

<script>
const API_BASE = window.location.origin;
let state = {
  imageData: null, ocrText: '',
  reports: {}, reportOrder: [],
  totalCost: 0, recognitionDone: false,
  userCode: ''
};

function getUserCode() {
  var urlCode = new URLSearchParams(window.location.search).get('code') || '';
  if (urlCode) {
    sessionStorage.setItem('see_code_shared', urlCode);
    var inp = document.getElementById('userCode');
    if (inp) { inp.value = urlCode; inp.parentElement.classList.add('hidden'); }
    return urlCode;
  }
  return document.getElementById('userCode').value.trim() || sessionStorage.getItem('see_code_shared') || '';
}

function saveReports() {
  const code = getUserCode();
  if (!code) return;
  let versions = [];
  try { const s = localStorage.getItem('see_talent_reports_v2_' + code); if(s) versions = JSON.parse(s).versions||[]; } catch(e){}
  versions.push({
    time: new Date().toLocaleDateString('zh-CN') + ' ' + new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'}),
    hasTalent: !!state.reports.portrait,
    portrait: state.reports.portrait||'', learning: state.reports.learning||'', emotion: state.reports.emotion||'', potential: state.reports.potential||''
  });
  if (versions.length > 20) versions = versions.slice(-20);
  localStorage.setItem('see_talent_reports_v2_' + code, JSON.stringify({versions, time: new Date().toISOString()}));
  sessionStorage.setItem('see_code_shared', code);
}

function loadUserReports() {
  const code = getUserCode();
  if (!code) return;
  sessionStorage.setItem('see_code_shared', code);
  // Migrate old data
  try {
    const old = localStorage.getItem('see_talent_reports_' + code);
    if (old && !localStorage.getItem('see_talent_reports_v2_' + code)) {
      const d = JSON.parse(old);
      localStorage.setItem('see_talent_reports_v2_' + code, JSON.stringify({versions: [{
        time: d.time ? new Date(d.time).toLocaleDateString('zh-CN') : '历史报告',
        hasTalent: !!(d.reports||{}).portrait,
        portrait: (d.reports||{}).portrait||'',
        learning: (d.reports||{}).learning||'', emotion: (d.reports||{}).emotion||'', potential: (d.reports||{}).potential||''
      }], time: d.time||new Date().toISOString()}));
    }
  } catch(e){}
  const saved = localStorage.getItem('see_talent_reports_v2_' + code);
  if (saved) {
    try {
      const data = JSON.parse(saved);
      const versions = data.versions || [];
      if (versions.length > 0) {
        const last = versions[versions.length-1];
        state.reports = {portrait: last.portrait||'', learning: last.learning||'', emotion: last.emotion||'', potential: last.potential||''};
        state.reportOrder = Object.keys(state.reports).filter(k => state.reports[k]);
      }
      showSavedReports();
    } catch(e) {}
  } else {
    document.getElementById('savedReportsSection').classList.add('hidden');
  }
}

function showSavedReports() {
  const keys = Object.keys(state.reports);
  if (keys.length === 0) return;
  document.getElementById('savedReportsSection').classList.remove('hidden');
  const names = {portrait:'🧬 先天特质画像', learning:'📖 学习风格', emotion:'💫 情绪模式', potential:'🎯 潜能发展'};
  let html = '';
  keys.forEach(k => {
    html += `<span style="cursor:pointer;margin-right:12px;color:var(--accent)" onclick="viewSavedReport('${k}')">${names[k]||k}</span>`;
  });
  document.getElementById('savedReportsList').innerHTML = html;
}

function viewSavedReport(key) {
  if (state.reports[key]) {
    document.getElementById('reportCard').classList.remove('hidden');
    document.getElementById('reportContent').classList.remove('loading');
    document.getElementById('reportContent').innerHTML = parseMD(state.reports[key]);
    document.getElementById('chatSection').style.display='block';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  // Auto-load if code in session
  const savedCode = sessionStorage.getItem('see_code_shared');
  if (savedCode) {
    document.getElementById('userCode').value = savedCode;
    loadUserReports();
  }
  const zone = document.getElementById('uploadZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); });
});

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    state.imageData = e.target.result;
    document.getElementById('uploadPlaceholder').style.display = 'none';
    var pv = document.getElementById('preview');
    pv.src = state.imageData;
    pv.style.display = 'block';
    document.getElementById('btnRecognize').disabled = false;
    document.getElementById('uploadStatus').textContent = file.name;
  };
  reader.readAsDataURL(file);
}

async function startFullFlow() {
  var age = parseInt(document.getElementById('reportAge').value);
  if (!age || age < 0) {
    alert('请先填写年龄');
    return;
  }
  const btn = document.getElementById('btnRecognize');
  const status = document.getElementById('uploadStatus');
  btn.disabled = true;

  // === Phase 1: OCR ===
  btn.textContent = '⏳ 加载OCR引擎...';
  document.getElementById('reportCard').classList.remove('hidden');
  document.getElementById('reportContent').classList.add('loading');
  document.getElementById('reportContent').textContent = '正在识别图片中的文字...';
  document.getElementById('ocrProgress').style.display = 'block';
  document.getElementById('ocrProgress').textContent = '';

  let ocrText = '';
  try {
    var cfg = window.TESSERACT_CONFIG || {};
    const worker = await Tesseract.createWorker('chi_sim+eng', 1, {
      workerPath: cfg.workerPath,
      logger: m => {
        if (m.status === 'recognizing text') {
          btn.textContent = '🔍 识别 ' + Math.round(m.progress * 100) + '%';
        } else if (m.status === 'loading tesseract core' || m.status === 'loading language traineddata') {
          btn.textContent = '⏳ 加载引擎...';
        } else {
          btn.textContent = '⏳ ' + m.status;
        }
      }
    });
    const { data } = await worker.recognize(state.imageData);
    await worker.terminate();
    ocrText = data.text || '';
    document.getElementById('ocrProgress').textContent = '✅ OCR: ' + ocrText.length + '字';
  } catch(e) {
    btn.disabled = false; btn.textContent = '🔍 识别并生成报告';
    document.getElementById('reportContent').textContent = '❌ OCR失败: ' + e.message;
    document.getElementById('ocrProgress').textContent = '❌ 识别失败，请重试';
    return;
  }

  state.ocrText = ocrText;
  state.recognitionDone = true;

  // === Phase 2: Generate Report ===
  btn.textContent = '📝 生成报告中...';
  document.getElementById('reportContent').textContent = '正在结合知识库生成报告...';

  try {
    const resp = await fetch(API_BASE + '/api/talent-v2', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ocrText: state.ocrText, type: 'portrait', style: document.getElementById('reportStyle').value, age: parseInt(document.getElementById('reportAge').value), target: document.getElementById('reportTarget').value})
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    state.reports = {portrait: data.content};
    state.reportOrder = ['portrait'];
    state.lastDebug = data.debug || null;
    saveReports();
    document.getElementById('reportContent').classList.remove('loading');
    document.getElementById('reportContent').innerHTML = renderStack();
    document.getElementById('reportCard').scrollIntoView({behavior:'smooth',block:'start'});
    document.getElementById('chatSection').style.display='block';
    state.conversation = [];
    document.getElementById('chatMessages').innerHTML = '';
    document.getElementById('chatInput').value = '';
    document.getElementById('btnSummarize').style.display = 'block';
    showDebug(data.debug);
  } catch(e) { document.getElementById('reportContent').textContent = '生成失败: ' + e.message; }

  btn.disabled = false;
  btn.textContent = '🔄 重新识别并生成';
}

// ===== 对话式咨询 =====
async function sendChat() {
  var input = document.getElementById('chatInput');
  var msg = input.value.trim();
  if (!msg) return;
  if (!state.conversation) state.conversation = [];
  var btn = document.querySelector('#chatSection .btn-primary');
  if (btn) btn.disabled = true;

  // 自动触发整合
  if (/可以整合|出报告|生成.*报告|整合/.test(msg)) {
    state.conversation.push({role:'user',content:msg});
    appendChat('user', msg + ' ✅');
    input.value = '';
    if (btn) btn.disabled = false;
    document.getElementById('btnSummarize').click();
    return;
  }

  appendChat('user', msg);
  input.value = '';
  var loadingId = 'loading_' + Date.now();
  appendChat('assistant', '⏳ 思考中...', loadingId);

  var controller = new AbortController();
  var timeout = setTimeout(function(){ controller.abort(); }, 90000);

  try {
    var resp = await fetch(API_BASE + '/api/talent-chat', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        reportText: state.reports.portrait||'',
        conversation: state.conversation,
        userMessage: msg,
        action: 'chat',
        ocrText: state.ocrText,
        age: parseInt(document.getElementById('reportAge').value),
        persona: {
          target: document.getElementById('reportTarget').value,
          style: document.getElementById('reportStyle').value
        }
      }),
      signal: controller.signal
    });
    clearTimeout(timeout);
    var data = await resp.json();
    var loadingEl = document.getElementById(loadingId);
    if (!resp.ok || data.error) {
      var errMsg = data.error || ('HTTP ' + resp.status);
      if (loadingEl) loadingEl.innerHTML = '❌ ' + errMsg + '<br><span style=\"font-size:.75em;color:var(--muted)\">本次讨论没有成功保存，请重试。</span>';
      if (btn) btn.disabled = false;
      return;
    }

    if (loadingEl) loadingEl.innerHTML = '<b>顾问：</b>' + data.reply.replace(/\n/g,'<br>');

    state.conversation.push({role:'user',content:msg});
    state.conversation.push({role:'assistant',content:data.reply});
  } catch(e) {
    clearTimeout(timeout);
    var loadingEl = document.getElementById(loadingId);
    if (loadingEl) loadingEl.innerHTML = '❌ ' + (e.name === 'AbortError' ? '请求超时，请重试' : e.message) + '<br><span style=\"font-size:.75em;color:var(--muted)\">本次讨论没有成功保存，请重试。</span>';
  }
  if (btn) btn.disabled = false;
}

function appendChat(role, text, id) {
  var container = document.getElementById('chatMessages');
  var div = document.createElement('div');
  if (id) div.id = id;
  div.style.cssText = 'padding:8px 12px;margin-bottom:6px;border-radius:8px;' +
    (role === 'user' ? 'background:#1e2a3a;text-align:right;' : 'background:#1a1a35;');
  var prefix = role === 'user' ? '<b style="color:var(--accent2)">你：</b>' : '<b style="color:var(--accent)">顾问：</b>';
  div.innerHTML = prefix + text.replace(/\n/g,'<br>');
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function summarizeChat() {
  var convLen = state.conversation ? state.conversation.length : 0;
  var hasReport = !!state.reports.portrait;
  var hasOcr = !!state.ocrText;
  if (!state.conversation || convLen === 0) {
    alert('无法整合：尚无对话记录。请先在聊天框与顾问讨论。');
    return;
  }
  if (!hasReport) {
    alert('无法整合：原始报告丢失。请重新生成报告。');
    return;
  }
  var btn = document.getElementById('btnSummarize');
  btn.disabled = true; btn.textContent = '⏳ 整合中...';

  var controller = new AbortController();
  var timeout = setTimeout(function(){ controller.abort(); }, 90000);

  try {
    var resp = await fetch(API_BASE + '/api/talent-chat', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        reportText: state.reports.portrait||'',
        conversation: state.conversation,
        action: 'summarize',
        ocrText: state.ocrText,
        age: parseInt(document.getElementById('reportAge').value),
        persona: {
          target: document.getElementById('reportTarget').value,
          style: document.getElementById('reportStyle').value
        }
      }),
      signal: controller.signal
    });
    clearTimeout(timeout);
    var data = await resp.json();
    if (!resp.ok || data.error) {
      var errMsg = data.error || ('HTTP ' + resp.status);
      alert('整合失败: ' + errMsg);
      btn.disabled = false; btn.textContent = '📝 重新整合';
      return;
    }

    // 追加整合版（不覆盖原报告）
    var v = (state.reportOrder.filter(function(k){return k.startsWith('final')}).length) + 1;
    var key = 'final_' + v;
    state.reports[key] = data.reply;
    state.reportOrder.push(key);
    saveReports();
    var rc = document.getElementById('reportCard');
    rc.classList.remove('hidden');
    var content = document.getElementById('reportContent');
    content.innerHTML = renderStack();
    content.classList.remove('loading');
    rc.scrollIntoView({behavior:'smooth',block:'start'});
    setTimeout(function(){ content.scrollTop = content.scrollHeight; }, 300);
    alert('✅ 整合报告已生成！请向上滚动查看原报告，向下查看新报告。');
  } catch(e) {
    clearTimeout(timeout);
    btn.disabled = false; btn.textContent = '📝 生成整合报告';
    if (e.name === 'AbortError') alert('整合请求超时，请检查网络后重试');
    else alert('整合失败: ' + e.message);
    return;
  }
  btn.disabled = false; btn.textContent = '📝 生成整合报告';
}

// ===== 合盘 =====
let compositeType = '';
function startComposite(type) {
  compositeType = type;
  document.getElementById('compositeFile').click();
}
async function handleCompositeFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    const ids = {parent:'compositeParent',partner:'compositePartner',family:'compositeFamily'};
    const card = document.getElementById(ids[compositeType]);
    const status = document.getElementById(ids[compositeType]+'Status');
    status.classList.remove('hidden');
    status.textContent = '⏳ 识别中...';
    const resp = await fetch(API_BASE + '/api/vision', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({image: e.target.result})
    });
    const data = await resp.json();
    if (data.error) { status.textContent = '❌'; return; }
    status.textContent = '⏳ 生成合盘报告...';
    const compResp = await fetch(API_BASE + '/api/composite', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        type: compositeType,
        myPortrait: state.reports.portrait||'',
        partnerAnswers: data.answers||{},
        partnerHandwritten: data.handwritten_fields||{}
      })
    });
    const compData = await compResp.json();
    if (compData.error) { status.textContent = '❌'; return; }
    document.getElementById('reportContent').classList.remove('loading');
    document.getElementById('reportContent').innerHTML = parseMD(compData.content);
    document.getElementById('reportCard').classList.remove('hidden');
    status.textContent = '✅';
  };
  reader.readAsDataURL(file);
}

function parseMD(md) {
  return md
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2 style="color:var(--accent2);margin-top:20px">$1</h2>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/^(?!<)(.+)$/gm,'<p>$1</p>');
}

function getReportLabel(k) {
  if (k === 'portrait') return '📋 先天思维特质报告';
  if (k.startsWith('final')) return '📋 综合解读报告 V' + k.split('_')[1];
  var m = {action:'🌱 个人成长建议',communication:'💞 关系洞察',career:'🚀 事业发展'};
  return m[k] || '📋 报告';
}

var REPORT_LABELS = {portrait:'📋 先天思维特质报告',action:'🌱 个人成长建议',communication:'💞 关系洞察',career:'🚀 事业发展'};
function renderStack() {
  var parts = [];
  for (var i = 0; i < state.reportOrder.length; i++) {
    var k = state.reportOrder[i];
    if (state.reports[k]) {
      parts.push(
        '<div style="background:linear-gradient(135deg,#2a2a48,#1e1e40);padding:20px;border-radius:10px;margin-bottom:16px;border-left:3px solid var(--accent)">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'+
        '<span style="font-weight:700;font-size:1em;color:var(--accent)">'+getReportLabel(k)+'</span>'+
        '<span style="display:flex;gap:4px">'+
        '<button class="btn btn-outline btn-sm" onclick="downloadReport(\''+k+'\',\'md\')" style="font-size:.65em;padding:3px 8px">MD</button>'+
        '<button class="btn btn-outline btn-sm" onclick="downloadReport(\''+k+'\',\'doc\')" style="font-size:.65em;padding:3px 8px">Word</button>'+
        '<button class="btn btn-outline btn-sm" onclick="downloadReport(\''+k+'\',\'pdf\')" style="font-size:.65em;padding:3px 8px">PDF</button>'+
        '</span>'+
        '</div>'+
        '<div>'+parseMD(state.reports[k])+'</div>'+
        '</div>'
      );
    }
  }
  return parts.join('<hr style="border-color:#2a2a45;margin:20px 0">');
}

function showDebug(debug) {
  if (!debug) return;
  var m = debug.metrics || {};
  var s = debug.structure || {};
  var trc = s.trc || {};
  var atd = s.atd || {};
  var ch = s.channel || {};
  var bh = s.behavior || {};
  var combos = s.combos || [];
  var patterns = s.pattern_insights || [];
  var rules = [];
  if (trc.label) rules.push('TRC: '+trc.label+'(价值'+trc.value+') '+trc.capacity);
  if (atd.label) rules.push('ATD: '+atd.label+'(价值'+atd.value+') '+atd.focus);
  if (ch.label) rules.push('通道: '+ch.label);
  if (bh.type) rules.push('行为: '+bh.type);
  for (var i=0;i<combos.length;i++) rules.push('组合: '+combos[i].label);
  var html = '<details style="margin-top:12px;font-size:.8em;color:var(--muted)"><summary style="cursor:pointer;padding:6px 0">🔍 引擎调试信息</summary><div style="padding:10px;background:#111;border-radius:8px;margin-top:6px;line-height:1.6;max-height:400px;overflow-y:auto"><b>指标提取:</b> TRC='+(m.trc||'?')+' ATD='+(m.atd||'?')+' 行为='+(m.behavior_mode||'?')+' 通道='+(m.primary_channel||'?')+'<br><b>命中规则 ('+rules.length+'):</b><br>'+rules.map(function(r,i){return '&nbsp;&nbsp;'+(i+1)+'. <b>'+r+'</b>'}).join('<br>')+'<br><b>纹型解读 ('+patterns.length+'):</b><br>'+patterns.map(function(p){return '&nbsp;&nbsp;'+p.area+'('+p.code+'): '+p.insight}).join('<br>')+'<br><b>检索:</b> 洞察'+(debug.insights_count||0)+'条 · 表达'+(debug.narratives_count||0)+'条 · 方案'+(debug.interventions_count||0)+'条<br><b>风格:</b> '+(debug.style||'?')+'<br><b>OCR原文:</b> <span style="word-break:break-all">'+(state.ocrText||'').substring(0,300)+'...</span></div></details>';
  var reportCard = document.getElementById('reportCard');
  var el = document.getElementById('debugPanel');
  if (!el) { el = document.createElement('div'); el.id = 'debugPanel'; reportCard.appendChild(el); }
  el.innerHTML = html;
}

function downloadServerPDF(md, filename) {
  // Form-based POST: browser handles PDF response natively (works on mobile Safari)
  var form = document.createElement('form');
  form.method = 'POST';
  form.action = API_BASE + '/api/export-pdf';
  form.target = '_blank';
  form.style.display = 'none';
  var titleInput = document.createElement('input');
  titleInput.name = 'title'; titleInput.value = filename;
  form.appendChild(titleInput);
  var mdInput = document.createElement('input');
  mdInput.name = 'markdown'; mdInput.value = md;
  form.appendChild(mdInput);
  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);
}

function downloadReport(key, format) {
  var key = key || null;
  var format = format || 'md';
  var md = '';
  var filename = 'SEE_报告';
  if (key) {
    md = '# ' + getReportLabel(key) + '\n\n' + (state.reports[key]||'');
    filename = 'SEE_' + getReportLabel(key).replace(/[📋\s]/g,'_');
  } else {
    for (var i = 0; i < state.reportOrder.length; i++) {
      var k = state.reportOrder[i];
      if (state.reports[k]) {
        md += '# ' + getReportLabel(k) + '\n\n' + state.reports[k] + '\n\n---\n\n';
      }
    }
    filename = 'SEE_全部报告';
  }
  if (!md) return;
  var isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent || '');

  if (format === 'pdf') {
    // Server-side PDF export (mobile Safari compatible)
    downloadServerPDF(md, filename);
    return;
  }

  if (format === 'md') {
    // Markdown 纯文本下载
    var blob0 = new Blob([md], {type: 'text/markdown;charset=utf-8'});
    var url0 = URL.createObjectURL(blob0);
    if (isMobile) {
      if (navigator.canShare && navigator.share && window.File) {
        try {
          var file0 = new File([blob0], filename + '.md', {type: 'text/markdown;charset=utf-8'});
          if (navigator.canShare({files:[file0]})) {
            navigator.share({files:[file0], title: filename}).catch(function(){});
            setTimeout(function(){ URL.revokeObjectURL(url0); }, 30000);
            return;
          }
        } catch (e) {}
      }
      var a0m = document.createElement('a');
      a0m.href = url0; a0m.target = '_blank'; a0m.rel = 'noopener';
      document.body.appendChild(a0m); a0m.click(); document.body.removeChild(a0m);
      setTimeout(function(){ URL.revokeObjectURL(url0); }, 30000);
      return;
    }
    var a0 = document.createElement('a');
    a0.href = url0; a0.download = filename + '.md';
    document.body.appendChild(a0); a0.click(); document.body.removeChild(a0);
    URL.revokeObjectURL(url0);
    return;
  }

  var html = '<!DOCTYPE html><html><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><style>body{font-family:serif;max-width:720px;margin:20px auto;padding:16px;line-height:1.9;color:#333;font-size:16px}h1{font-size:1.4em}h2{font-size:1.15em;margin-top:24px}h3{font-size:1em}p{margin:10px 0}li{margin:6px 0}</style></head><body><h1>' + getReportLabel(key||'report') + '</h1>' + parseMD(md) + '</body></html>';
  var blob = new Blob([html], {type: 'text/html;charset=utf-8'});
  var url = URL.createObjectURL(blob);

  if (isMobile) {
    var w = window.open(url, '_blank');
    if (!w) { alert('请允许弹出窗口，或使用浏览器分享/打印'); location.href = url; }
    setTimeout(function(){
      try { if (w) { w.focus(); w.print(); } } catch (e) {}
    }, 800);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 30000);
    return;
  }

  // 桌面端：直接下载
  var a = document.createElement('a');
  a.href = url; a.download = filename + (format === 'doc' ? '.doc' : '.html');
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  if (format === 'pdf') { setTimeout(function(){ window.open(url, '_blank'); }, 300); }
  setTimeout(function(){ URL.revokeObjectURL(url); }, 5000);
}
